  /* â”€â”€ Dark overlay so text reads cleanly â”€â”€ */
  .bg-overlay {
    position: absolute;
    inset: 0;
    background:
      linear-gradient(90deg, rgba(0,0,0,0.65) 0%, rgba(0,0,0,0.35) 50%, rgba(0,0,0,0.05) 100%),
      linear-gradient(180deg, rgba(0,0,0,0.2) 0%, transparent 25%, transparent 75%, rgba(0,0,0,0.35) 100%);
    z-index: 1;
  }

  /* â”€â”€ Subtle purple tint on the right â”€â”€ */
  .purple-tint {
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse 55% 70% at 85% 50%, rgba(100,30,200,0.25) 0%, transparent 70%);
    z-index: 2;
  }

  /* â”€â”€ Noise grain â”€â”€ */
  .grain {
    position: absolute;
    inset: 0;
    opacity: 0.04;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
    background-size: 256px 256px;
    z-index: 3;
  }

  /* â”€â”€ Content â”€â”€ */
  .content {
    position: absolute;
    inset: 0;
    z-index: 5;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 0 72px;
  }

  /* â”€â”€ DEVLOG pill â”€â”€ */
  .devlog-pill {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: rgba(140,60,255,0.18);
    border: 1px solid rgba(160,80,255,0.5);
    border-radius: 4px;
    padding: 6px 18px;
    width: fit-content;
    margin-bottom: 22px;
  }

  .devlog-pill .ep {
    font-family: 'Segoe UI', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: #c890ff;
  }

  .devlog-pill .dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: #a060ff;
    box-shadow: 0 0 6px #a060ff;
  }

  /* â”€â”€ Headline â”€â”€ */
  .headline {
    font-family: 'Segoe UI', 'Arial Black', sans-serif;
    font-weight: 900;
    line-height: 1.0;
    text-transform: uppercase;
    margin-bottom: 24px;
  }

  .headline .line1 {
    font-size: 72px;
    color: #fff;
    letter-spacing: -1px;
    text-shadow: 0 0 40px rgba(200,150,255,0.4), 0 2px 0 rgba(0,0,0,0.9);
    display: block;
  }

  .headline .line2 {
    font-size: 112px;
    letter-spacing: -3px;
    display: block;
    background: linear-gradient(135deg, #e8d0ff 0%, #bf80ff 40%, #9040ef 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    filter: drop-shadow(0 0 30px rgba(160,80,255,0.7));
  }

  /* â”€â”€ Subline â”€â”€ */
  .subline {
    font-family: 'Segoe UI', sans-serif;
    font-size: 22px;
    font-weight: 300;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: rgba(200,170,255,0.7);
    text-shadow: 0 0 12px rgba(140,60,255,0.4);
  }

  /* â”€â”€ Bottom bar â”€â”€ */
  .bottom-bar {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 5px;
    background: linear-gradient(90deg,
      transparent 0%,
      rgba(120,40,255,0.6) 20%,
      rgba(180,100,255,1.0) 50%,
      rgba(120,40,255,0.6) 80%,
      transparent 100%);
    z-index: 6;
  }

  /* â”€â”€ Studio watermark â”€â”€ */
  .watermark {
    position: absolute;
    bottom: 22px;
    right: 36px;
    z-index: 6;
    font-family: 'Segoe UI', sans-serif;
    font-size: 14px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: rgba(160,100,255,0.5);
  }
</style>
</head>

<div class="thumb" id="thumb">
  <div class="bg"></div>
  <div class="bg-overlay"></div>
  <div class="purple-tint"></div>
  <div class="grain"></div>

  <div class="content">
    <div class="devlog-pill">
      <div class="dot"></div>
      <span class="ep">Devlog &nbsp;#01</span>
    </div>
    <div class="headline">
      <span class="line1">First Look at</span>
      <span class="line2">Spiritless</span>
    </div>
    <div class="subline">RESTORING A DEAD WORLD &mdash; ONE SOUL AT A TIME</div>
  </div>

  <div class="bottom-bar"></div>
  <div class="watermark">Void Soul Studio</div>
</div>
