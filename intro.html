<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Void Soul Studio</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000;
    overflow: hidden;
    width: 100vw;
    height: 100vh;
    font-family: 'Segoe UI', sans-serif;
  }

  #stage {
    position: relative;
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  #starCanvas {
    position: absolute;
    inset: 0;
    z-index: 0;
  }

  #lightningCanvas {
    position: absolute;
    inset: 0;
    z-index: 1;
    pointer-events: none;
  }

  /* ── Image logo (used when file is present) ── */
  #logoImg {
    position: absolute;
    z-index: 2;
    width: min(70vw, 900px);
    opacity: 0;
    transform: scale(0.85);
    filter: brightness(0) saturate(0);
  }

  /* ── Text logo fallback ── */
  #logoText {
    position: absolute;
    z-index: 2;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
    opacity: 0;
    transform: scale(0.85);
    pointer-events: none;
    user-select: none;
  }

  .logo-icon {
    font-size: clamp(64px, 10vw, 120px);
    line-height: 1;
    filter: drop-shadow(0 0 18px rgba(130,60,255,0.9));
  }

  .logo-wordmark {
    display: flex;
    align-items: center;
    gap: clamp(10px, 2vw, 22px);
    margin-top: 12px;
  }

  .logo-word {
    font-size: clamp(28px, 4.5vw, 58px);
    font-weight: 200;
    letter-spacing: clamp(6px, 1.5vw, 14px);
    color: #e8d8ff;
    text-transform: uppercase;
    font-family: 'Trebuchet MS', 'Segoe UI', sans-serif;
    text-shadow:
      0 0 20px rgba(150,80,255,0.8),
      0 0 60px rgba(120,50,220,0.4);
  }

  .logo-sep {
    width: clamp(30px, 4vw, 52px);
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(150,80,255,0.8), transparent);
  }

  .logo-divider-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 6px;
    width: 100%;
    justify-content: center;
  }

  .logo-line {
    flex: 1;
    max-width: 120px;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(150,80,255,0.6));
  }
  .logo-line.right {
    background: linear-gradient(90deg, rgba(150,80,255,0.6), transparent);
  }

  .logo-sub {
    font-size: clamp(10px, 1.6vw, 16px);
    letter-spacing: clamp(4px, 1.2vw, 10px);
    color: rgba(200, 170, 255, 0.7);
    text-transform: uppercase;
    font-family: 'Trebuchet MS', 'Segoe UI', sans-serif;
    text-shadow: 0 0 10px rgba(130,60,255,0.5);
  }

  #vignette {
    position: absolute;
    inset: 0;
    z-index: 3;
    background: radial-gradient(ellipse at center,
      transparent 30%,
      rgba(0,0,0,0.55) 70%,
      rgba(0,0,0,0.93) 100%);
    pointer-events: none;
  }

  #overlay {
    position: absolute;
    inset: 0;
    z-index: 10;
    background: #000;
    pointer-events: none;
  }

  #skipBtn {
    position: absolute;
    bottom: 32px;
    right: 40px;
    z-index: 20;
    color: rgba(160, 100, 255, 0.5);
    font-size: 13px;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    opacity: 0;
    transition: color 0.3s;
    user-select: none;
  }
  #skipBtn:hover { color: rgba(180, 130, 255, 0.9); }
</style>
</head>
<body>
<div id="stage">
  <canvas id="starCanvas"></canvas>
  <canvas id="lightningCanvas"></canvas>

  <!-- Image logo — shown when VoidSoulStudio_Banner.png is present -->
  <img id="logoImg" src="VoidSoulStudio_Banner.png" alt="" />

  <!-- Text logo — shown as fallback -->
  <div id="logoText">
    <div class="logo-icon">✦</div>
    <div class="logo-wordmark">
      <span class="logo-word">Void</span>
      <div class="logo-sep"></div>
      <span class="logo-word">Soul</span>
    </div>
    <div class="logo-divider-row">
      <div class="logo-line"></div>
      <span class="logo-sub">Studio</span>
      <div class="logo-line right"></div>
    </div>
  </div>

  <div id="vignette"></div>
  <div id="overlay"></div>
  <div id="skipBtn">Skip ▶</div>
</div>

<script>
const $ = id => document.getElementById(id);
const rand = (a, b) => Math.random() * (b - a) + a;
const clamp = (v, a, b) => Math.max(a, Math.min(b, v));
const lerp = (a, b, t) => a + (b - a) * t;

function easeOutCubic(t) { return 1 - Math.pow(1 - t, 3); }
function easeOutExpo(t)  { return t === 1 ? 1 : 1 - Math.pow(2, -10 * t); }

// ── Canvas setup ─────────────────────────────────────────────
const starCanvas = $('starCanvas');
const ctx = starCanvas.getContext('2d');
const lCanvas = $('lightningCanvas');
const lCtx = lCanvas.getContext('2d');

function resize() {
  starCanvas.width = lCanvas.width = window.innerWidth;
  starCanvas.height = lCanvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// ── Decide which logo element to use ─────────────────────────
const logoImg  = $('logoImg');
const logoText = $('logoText');
let activeLogo = logoText;   // default to text

logoImg.onload = () => {
  activeLogo = logoImg;
  logoText.style.display = 'none';
};
logoImg.onerror = () => {
  logoImg.style.display = 'none';
  activeLogo = logoText;
};

// ── Stars ────────────────────────────────────────────────────
const STAR_COUNT = 340;
const stars = Array.from({ length: STAR_COUNT }, () => ({
  x: rand(0, 1), y: rand(0, 1),
  r: rand(0.3, 1.9),
  brightness: rand(0.15, 0.85),
  twinkleSpeed: rand(0.3, 1.2),
  twinkleOffset: rand(0, Math.PI * 2),
  born: rand(0, 1),
  purple: Math.random() < 0.3,
}));

// ── Nebula blobs ─────────────────────────────────────────────
const NEBULA_COUNT = 65;
const nebulas = Array.from({ length: NEBULA_COUNT }, () => ({
  x: rand(0, 1), y: rand(0, 1),
  rx: rand(60, 230), ry: rand(20, 85),
  angle: rand(0, Math.PI * 2),
  alpha: rand(0.012, 0.07),
  hue: rand(240, 295),
}));

// ── Lightning ────────────────────────────────────────────────
function drawLightning(ctx, x1, y1, x2, y2, roughness, alpha, color) {
  const segs = 14;
  const pts = [[x1, y1]];
  for (let i = 1; i < segs; i++) {
    const t = i / segs;
    pts.push([
      lerp(x1, x2, t) + rand(-roughness, roughness),
      lerp(y1, y2, t) + rand(-roughness * 0.4, roughness * 0.4),
    ]);
  }
  pts.push([x2, y2]);

  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.strokeStyle = color;
  ctx.lineWidth = rand(0.5, 2.2);
  ctx.shadowColor = color;
  ctx.shadowBlur = 14;
  ctx.beginPath();
  ctx.moveTo(pts[0][0], pts[0][1]);
  pts.slice(1).forEach(p => ctx.lineTo(p[0], p[1]));
  ctx.stroke();
  ctx.globalAlpha = alpha * 0.5;
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 0.5;
  ctx.shadowBlur = 4;
  ctx.beginPath();
  ctx.moveTo(pts[0][0], pts[0][1]);
  pts.slice(1).forEach(p => ctx.lineTo(p[0], p[1]));
  ctx.stroke();
  ctx.restore();
}

// ── Timeline (seconds) ───────────────────────────────────────
const TL = {
  overlayFade:    { start: 0.2,  dur: 1.4 },
  starsAppear:    { start: 0.5,  dur: 2.0 },
  nebulaAppear:   { start: 1.0,  dur: 2.5 },
  logoReveal:     { start: 2.2,  dur: 2.2 },
  logoScale:      { start: 2.2,  dur: 2.8 },
  logoPurple:     { start: 3.2,  dur: 1.8 },
  lightningBurst: { start: 4.0,  dur: 3.5 },
  pulseRings:     { start: 4.4,  dur: 2.5 },
  holdEnd:        9.0,
};

function prog(t, s, d) { return clamp((t - s) / d, 0, 1); }

let startTime = null;
let finished  = false;
let lightningBolts = [];
let nextLightning  = 0;
let pulseRings = [];
let nextPulse  = 0;

function spawnPulse(t, cx, cy) {
  pulseRings.push({ born: t, cx, cy, dur: 1.8 });
}

// ── Main render loop ─────────────────────────────────────────
function render(ts) {
  if (startTime === null) startTime = ts;
  const t = (ts - startTime) / 1000;
  const W = starCanvas.width, H = starCanvas.height;
  const cx = W / 2, cy = H / 2;

  // Star canvas
  ctx.clearRect(0, 0, W, H);

  // Nebula
  const nebP = easeOutCubic(prog(t, TL.nebulaAppear.start, TL.nebulaAppear.dur));
  if (nebP > 0) {
    nebulas.forEach(n => {
      ctx.save();
      ctx.globalAlpha = n.alpha * nebP;
      ctx.translate(n.x * W, n.y * H);
      ctx.rotate(n.angle);
      const g = ctx.createRadialGradient(0, 0, 0, 0, 0, n.rx);
      g.addColorStop(0, `hsla(${n.hue},80%,55%,1)`);
      g.addColorStop(1, 'transparent');
      ctx.scale(1, n.ry / n.rx);
      ctx.beginPath();
      ctx.arc(0, 0, n.rx, 0, Math.PI * 2);
      ctx.fillStyle = g;
      ctx.fill();
      ctx.restore();
    });
  }

  // Stars
  const starP = prog(t, TL.starsAppear.start, TL.starsAppear.dur);
  stars.forEach(s => {
    if (s.born > starP) return;
    const fade = clamp((starP - s.born) / 0.3, 0, 1);
    const twinkle = 0.5 + 0.5 * Math.sin(t * s.twinkleSpeed * Math.PI * 2 + s.twinkleOffset);
    ctx.save();
    ctx.globalAlpha = s.brightness * fade * (0.4 + 0.6 * twinkle);
    ctx.fillStyle = s.purple ? `hsl(${rand(260, 290)},80%,80%)` : '#fff';
    ctx.shadowColor = s.purple ? '#b080ff' : '#ddd';
    ctx.shadowBlur = s.r * 3;
    ctx.beginPath();
    ctx.arc(s.x * W, s.y * H, s.r, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  });

  // Lightning canvas
  lCtx.clearRect(0, 0, W, H);

  const lP = prog(t, TL.lightningBurst.start, TL.lightningBurst.dur);
  if (lP > 0 && t < TL.holdEnd) {
    if (t > nextLightning) {
      const side = Math.random() < 0.5 ? 'left' : 'right';
      const baseX = side === 'left' ? W * 0.07 : W * 0.93;
      const count = Math.floor(rand(2, 5));
      for (let i = 0; i < count; i++) {
        lightningBolts.push({
          x1: baseX + rand(-45, 45),
          y1: rand(H * 0.08, H * 0.42),
          x2: baseX + rand(-90, 90),
          y2: rand(H * 0.58, H * 0.92),
          alpha: rand(0.45, 0.95),
          rough: rand(30, 95),
          life: rand(0.06, 0.2),
          born: t,
          color: `hsl(${rand(255, 288)},80%,65%)`,
        });
      }
      nextLightning = t + rand(0.10, 0.32);
    }
    lightningBolts = lightningBolts.filter(b => t - b.born < b.life);
    lightningBolts.forEach(b => {
      const age = (t - b.born) / b.life;
      drawLightning(lCtx, b.x1, b.y1, b.x2, b.y2, b.rough, b.alpha * (1 - age), b.color);
    });
  }

  // Pulse rings
  if (prog(t, TL.pulseRings.start, TL.pulseRings.dur) > 0 && t < TL.holdEnd) {
    if (t > nextPulse) {
      spawnPulse(t, cx, cy);
      nextPulse = t + rand(0.5, 1.1);
    }
  }
  pulseRings = pulseRings.filter(p => t - p.born < p.dur);
  pulseRings.forEach(p => {
    const age = (t - p.born) / p.dur;
    const radius = lerp(80, 440, easeOutExpo(age));
    lCtx.save();
    lCtx.globalAlpha = (1 - age) * 0.5;
    lCtx.strokeStyle = '#9050ff';
    lCtx.lineWidth = 1;
    lCtx.shadowColor = '#9050ff';
    lCtx.shadowBlur = 22;
    lCtx.beginPath();
    lCtx.arc(p.cx, p.cy, radius, 0, Math.PI * 2);
    lCtx.stroke();
    lCtx.restore();
  });

  // Logo animation
  const revealP = easeOutCubic(prog(t, TL.logoReveal.start, TL.logoReveal.dur));
  const scaleP  = easeOutCubic(prog(t, TL.logoScale.start,  TL.logoScale.dur));
  const purpleP = easeOutCubic(prog(t, TL.logoPurple.start, TL.logoPurple.dur));

  const brightness = lerp(0, 1, revealP);
  const opacity    = lerp(0, 1, revealP);
  const scale      = lerp(0.85, 1.0, scaleP);
  const glow       = lerp(0, 40, purpleP);
  const sat        = lerp(0, 100, revealP);

  activeLogo.style.opacity   = opacity;
  activeLogo.style.transform = `scale(${scale})`;

  if (activeLogo === logoImg) {
    activeLogo.style.filter = `brightness(${brightness}) saturate(${sat}%) drop-shadow(0 0 ${glow}px rgba(140,60,255,0.75))`;
  } else {
    // Text logo — glow via filter
    activeLogo.style.filter = `brightness(${brightness}) saturate(${sat}%) drop-shadow(0 0 ${glow * 0.6}px rgba(140,60,255,0.8))`;
  }

  // Overlay fade
  $('overlay').style.opacity = 1 - easeOutCubic(prog(t, TL.overlayFade.start, TL.overlayFade.dur));

  // Skip button
  if (t > 1.0) $('skipBtn').style.opacity = 0.7;

  if (t < TL.holdEnd && !finished) {
    requestAnimationFrame(render);
  } else {
    finished = true;
    fadeOut();
  }
}

function fadeOut() {
  const ov = $('overlay');
  ov.style.transition = 'opacity 1.2s ease-in';
  ov.style.opacity = 1;
  setTimeout(() => {
    document.body.innerHTML = '<div style="color:#6030bb;font-family:sans-serif;font-size:14px;letter-spacing:3px;text-align:center;margin-top:45vh;text-transform:uppercase;">[ replace with game scene ]</div>';
  }, 1300);
}

$('skipBtn').addEventListener('click', () => { finished = true; fadeOut(); });

requestAnimationFrame(render);
</script>
</body>
</html>
